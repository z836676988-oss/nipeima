name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Build Android APK (debug)
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle
          cd android
          if [ ! -f gradlew ]; then
            echo "Downloading Gradle wrapper 8.3..."
            mkdir -p gradle/wrapper
            curl -sL "https://services.gradle.org/distributions/gradle-8.3-bin.zip" -o gradle/wrapper/gradle-wrapper.zip
            cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradlew" -o gradlew
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradlew.bat" -o gradlew.bat
            chmod +x gradlew
          fi
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nipeima-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
