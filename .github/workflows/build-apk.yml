name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Build Android APK (debug)
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle
          cd android
          if [ ! -f gradlew ]; then
            echo "Downloading Gradle wrapper 8.3..."
            mkdir -p gradle/wrapper
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradlew" -o gradlew
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradlew.bat" -o gradlew.bat
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
            echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
            echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
            echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
            echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
            echo "validateDistributionUrl=true" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
            chmod +x gradlew
          fi
          cd ..
          echo "android { buildFeatures { buildConfig true } }" >> node_modules/react-native-vector-icons/android/build.gradle
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nipeima-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
